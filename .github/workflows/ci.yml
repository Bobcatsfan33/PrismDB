name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: tests (${{ matrix.profile }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile: [debug, release]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Debug catches the debug_assert!s; release is what the numbers are
      # measured under. A bug that only shows up in one of them is still a bug.
      - name: test
        run: |
          if [ "${{ matrix.profile }}" = "release" ]; then
            cargo test --workspace --release
          else
            cargo test --workspace
          fi

  faults:
    name: fault-injection matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Kills a real prism process at every declared durability boundary and
      # asserts the store opens to the old snapshot or the new one, never both.
      - run: cargo test --release -p prism-cli --test faults -- --nocapture

  fuzz:
    name: format fuzzing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Byte flips, every truncation length, total garbage, checksum-repairing
      # adversaries, and absurd lengths. The reader must decode it or refuse it
      # with a specific error -- never panic, never allocate on trust.
      - run: cargo test --release -p prism-part --test fuzz -- --nocapture

  campaign:
    name: kill/reopen campaign (short)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # A randomized sample on every commit; the full 10,000-run S1 gate runs
      # nightly (.github/workflows/nightly.yml). Never a hybrid snapshot, ever.
      - run: PRISM_CAMPAIGN_RUNS=400 cargo test --release -p prism-cli --test campaign -- --ignored --nocapture

  recall:
    name: recall contract vs the exact oracle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release
      - name: rebuild the golden store and check for drift + recall
        run: |
          set -euxo pipefail
          P=./target/release/prism
          $P init --path /tmp/golden --dim 64 --nlist 32 --pq-m 8 --seed 1234
          $P ingest --path /tmp/golden --file testing/golden/corpus.tsv
          # Three checks, all of which must hold:
          #   drift  — the exact answers must not have moved (inside `golden check`)
          #   recall — the approximate path must find them, at a stated scan cost
          #   TAIL   — and it must find them for EVERY query, not on average.
          #
          # The mean floor alone would have waved S0's `min recall = 0.000`
          # straight through: a mean of 0.904 with five queries returning nothing
          # is not a 90% system. --min-p1 is the floor that actually bites.
          $P golden check --path /tmp/golden --golden testing/golden/expected.json \
             --candidates 200 --rerank 50 --min-recall 0.95 --min-p1 0.8

  compat:
    name: format compatibility fixtures
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release
      - name: every released format must still open, verify, and answer
        run: |
          set -euxo pipefail
          for v in v1 v2; do
            ./target/release/prism verify --path "testing/compat/$v"
            ./target/release/prism fsck   --path "testing/compat/$v"
            ./target/release/prism search --path "testing/compat/$v" \
              --query "tool call timed out retrying" --k 3 --nprobe 8
          done
      - name: every corrupt fixture must be rejected, with a specific error
        run: |
          set -uo pipefail
          fail=0
          for d in testing/compat/corrupt/*/ testing/compat/corrupt-v2/*/; do
            msg=$(./target/release/prism verify --path "$d" 2>&1 | head -1)
            if ./target/release/prism verify --path "$d" >/dev/null 2>&1; then
              echo "FAIL: corrupt fixture $d was ACCEPTED"
              fail=1
            elif ! echo "$msg" | grep -q "corrupt data:"; then
              # A generic io error is not good enough. An operator woken at 3am
              # cannot act on "failed to fill whole buffer" -- the reader has to
              # say which byte lied.
              echo "FAIL: $d was rejected, but not with a specific error: $msg"
              fail=1
            else
              echo "ok: $(basename $d) -> ${msg:0:90}"
            fi
          done
          exit $fail

  quickstart:
    name: the README quickstart actually works
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Extracts the shell block out of README.md and runs it. Not a copy of the
      # quickstart -- the quickstart. If a command in the README does not work,
      # this job is red.
      - run: ./scripts/check-readme-quickstart.sh

  baselines:
    name: baselines are reproducible
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release
      # The committed baselines.json is a machine-generated artifact. This proves
      # `prism bench` still runs and still produces one; it does NOT assert on the
      # timings, which are machine-dependent and would make CI flaky for no gain.
      # What it does assert is the thing that must never regress silently: recall.
      - name: regenerate and check the recall floor
        run: |
          set -euxo pipefail
          ./target/release/prism bench --rows 20000 --kind zipf --out /tmp/baselines.json >/dev/null
          python3 - <<'PY'
          import json
          b = json.load(open("/tmp/baselines.json"))
          print(json.dumps(b, indent=2))
          assert b["recall_at_10"] >= 0.95, f"mean recall regressed to {b['recall_at_10']}"
          # The floor that actually bites. A mean can be 0.90 while queries return
          # nothing at all; the tail is what notices.
          assert b["zero_recall_queries"] == 0, \
              f"{b['zero_recall_queries']} queries returned NOTHING at the default nprobe"
          assert b["p1_recall_at_10"] >= 0.8, f"p1 recall regressed to {b['p1_recall_at_10']}"
          assert b["mean_scan_fraction"] < 0.5, \
              f"recall was bought by scanning {b['mean_scan_fraction']:.1%} of the data"
          assert b["rows_admitted"] + b["rows_dead_lettered"] == b["rows_offered"], \
              "rows went missing between offered and stored"
          print("recall floor holds, and no row vanished.")
          PY
